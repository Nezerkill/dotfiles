format = """
[Óā∂](#a6e3a1)\
$os\
$username\
[Óāį](bg:#89b4fa fg:#a6e3a1)\
$directory\
[Óāį](fg:#89b4fa bg:#333333)\
$git_branch\
$git_status\
[Óāį](fg:#333333)\
$cmd_duration\
\n$character"""

[os]
disabled = false
style = "bg:#a6e3a1 fg:#1e1e2e"

[os.symbols]
Arch = "ÔĆÉ "
Linux = "ÔÖľ "

[username]
show_always = true
style_user = "bg:#a6e3a1 fg:#1e1e2e"
style_root = "bg:#a6e3a1 fg:#1e1e2e"
format = '[ $user ]($style)'

[directory]
style = "bg:#89b4fa fg:#1e1e2e"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "bg:#333333"
format = '[[ $symbol $branch ](fg:#89b4fa bg:#333333)]($style)'

[git_status]
style = "bg:#333333"
format = '[[($all_status$ahead_behind )](fg:#89b4fa bg:#333333)]($style)'

[character]
success_symbol = "[‚ĚĮ](bold green)"
error_symbol = "[‚ĚĮ](bold red)"
