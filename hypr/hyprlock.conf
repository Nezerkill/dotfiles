# HYPRLOCK CONFIGURATION

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# ФОН
background {
    monitor =
    path = ~/.config-dev/dotfiles/assets/waves.png

    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ПОЛЕ ВВОДА ПАРОЛЯ
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    outer_color = rgb(137, 180, 250)
    inner_color = rgb(30, 30, 46)
    font_color = rgb(205, 214, 244)
    capslock_color = rgb(250, 179, 135)
    check_color = rgb(249, 226, 175)
    fail_color = rgb(243, 139, 168)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# ЧАСЫ
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 100
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 210
    halign = center
    valign = center
    shadow_passes = 5
    shadow_size = 10
}

# ДАТА
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(205, 214, 244, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 90
    halign = center
    valign = center
}

# ИНДИКАТОР РАСКЛАДКИ
label {
    monitor =
    text =   $LAYOUT
    color = rgb(180, 190, 254)
    font_size = 12
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -80
    halign = center
    valign = center
}

# МЕДИА ПЛЕЕР
image {
    monitor =
    path =
    size = 100
    rounding = 10
    border_size = 2
    border_color = rgb(137, 180, 250)
    rotate = 0
    reload_time = 2
    reload_cmd = ~/.config-dev/dotfiles/hypr/scripts/playerctlock.sh --arturl
    position = 0, 200
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:2000] ~/.config-dev/dotfiles/hypr/scripts/playerctlock.sh --title
    color = rgb(205, 214, 244)
    font_size = 14
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 150
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:2000] ~/.config-dev/dotfiles/hypr/scripts/playerctlock.sh --artist
    color = rgb(180, 190, 254)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = bottom
}

# КНОПКИ УПРАВЛЕНИЯ
label {
    monitor =
    text = 
    color = rgb(205, 214, 244)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = -60, 30
    halign = center
    valign = bottom
}

label {
    monitor =
    text = cmd[update:1000] ~/.config-dev/dotfiles/hypr/scripts/playerctlock.sh --status
    color = rgb(205, 214, 244)
    font_size = 50
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}

label {
    monitor =
    text = 
    color = rgb(205, 214, 244)
    font_size = 40
    font_family = JetBrainsMono Nerd Font
    position = 60, 30
    halign = center
    valign = bottom
}

# ПОГОДА
label {
    monitor =
    text = cmd[update:1800000] ~/.config-dev/dotfiles/hypr/scripts/weather.sh
    color = rgb(180, 190, 254)
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 40
    halign = center
    valign = center
}
